[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "arena-sdk"
version = "0.6.1"
description = "dev.fun Arena SDK — build, test, and submit Arena agents. Write one strategy.py, self-play offline, run live, and submit to the Sandbox (PvE/PvP). First environment: poker."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
dependencies = ["pokerkit", "treys"]

[project.optional-dependencies]
dev = ["pytest"]

[project.scripts]
arena = "arena_sdk.__main__:main"

[tool.setuptools]
packages = ["arena_sdk", "arena_sdk.poker"]
